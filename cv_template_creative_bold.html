<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Bold CV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        darkbg: '#0f172a',
                        cardbg: '#1e293b',
                        accent: '#38bdf8', // sky-400
                        accenthover: '#0ea5e9'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-900 p-0 md:p-10 min-h-screen flex justify-center">
    <!-- Main CV Container -->
    <div class="bg-darkbg text-gray-300 md:shadow-2xl w-full max-w-[210mm] min-h-[297mm] flex flex-col relative overflow-hidden">
        
        <!-- Decorative Background Element -->
        <div class="absolute top-0 right-0 w-64 h-64 bg-accent opacity-10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>

        <!-- Header -->
        <header class="p-12 pb-8 border-b border-slate-700/50 z-10">
            <h1 id="name" class="text-5xl font-extrabold tracking-tight text-white mb-2 uppercase"></h1>
            <h2 id="title" class="text-2xl font-medium mb-6 gradient-text"></h2>
            
            <div class="flex flex-wrap gap-6 text-sm font-light text-slate-400">
                <span class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded bg-slate-800 flex items-center justify-center text-accent">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </span>
                    <span id="email"></span>
                </span>
                <span class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded bg-slate-800 flex items-center justify-center text-accent">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </span>
                    <span id="phone"></span>
                </span>
                <span class="flex items-center gap-2">
                    <span class="w-6 h-6 rounded bg-slate-800 flex items-center justify-center text-accent">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </span>
                    <span id="location"></span>
                </span>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 flex flex-row">
            
            <!-- Left Column: Main Experience -->
            <div class="w-2/3 p-12 pr-6 border-r border-slate-700/50">
                <section class="mb-10">
                    <h2 class="text-lg font-bold text-white uppercase tracking-widest mb-4 flex items-center gap-3">
                        <span class="w-8 h-px bg-accent"></span> Summary
                    </h2>
                    <p id="summary" class="text-slate-400 leading-relaxed font-light text-justify"></p>
                </section>

                <section class="mb-8">
                    <h2 class="text-lg font-bold text-white uppercase tracking-widest mb-6 flex items-center gap-3">
                        <span class="w-8 h-px bg-accent"></span> Experience
                    </h2>
                    <div id="experience-list" class="space-y-8 relative before:absolute before:inset-0 before:ml-[5px] before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-700 before:to-transparent pl-4 md:pl-0"></div>
                </section>
            </div>

            <!-- Right Column: Sidebar -->
            <div class="w-1/3 bg-cardbg p-12 pl-6">
                <section class="mb-10">
                    <h2 class="text-lg font-bold text-white uppercase tracking-widest mb-6 border-b border-slate-700 pb-2">
                        Education
                    </h2>
                    <div id="education-list" class="space-y-6"></div>
                </section>

                <section class="mb-10">
                    <h2 class="text-lg font-bold text-white uppercase tracking-widest mb-6 border-b border-slate-700 pb-2">
                        Skills
                    </h2>
                    <div id="skills-list" class="flex flex-wrap gap-2"></div>
                </section>
            </div>

        </div>
    </div>

    <!-- CV Data JSON -->
    <script type="application/json" id="cv-data">
    {
      "name": "Alex Mercer",
      "title": "Creative Tech Lead",
      "email": "alex.mercer@example.com",
      "phone": "+44 7911 123456",
      "location": "London, UK",
      "summary": "Forward-thinking Tech Lead with a passion for building beautifully crafted, high-performance web experiences. Merges technical excellence with a strong design sensibility. Experienced in leading remote teams to deliver products that impact millions.",
      "experience": [
        {
          "company": "Nebula Innovations",
          "role": "Lead Frontend Engineer",
          "dates": "2021 - Present",
          "description": [
            "Architected the next-generation trading platform interface using Next.js and WebGL.",
            "Spearheaded a complete design system overhaul, increasing developer velocity by 30%.",
            "Managed a distributed team of 8 engineers across 3 time zones."
          ]
        },
        {
          "company": "Pixel & Code",
          "role": "Senior UI Engineer",
          "dates": "2018 - 2021",
          "description": [
            "Developed award-winning marketing sites for Fortune 500 clients.",
            "Implemented complex GSAP animations ensuring 60fps performance.",
            "Introduced automated accessibility testing into the CI pipeline."
          ]
        }
      ],
      "education": [
        {
          "institution": "University of Arts London",
          "degree": "B.A. Interaction Design",
          "dates": "2014 - 2018"
        }
      ],
      "skills": ["TypeScript", "React", "Next.js", "Three.js", "Tailwind CSS", "GSAP", "Figma", "Node.js", "GraphQL"]
    }
    </script>

    <!-- Injection Script -->
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const dataText = document.getElementById('cv-data').textContent;
        const data = JSON.parse(dataText);

        document.getElementById('name').textContent = data.name;
        document.getElementById('title').textContent = data.title;
        document.getElementById('email').textContent = data.email;
        document.getElementById('phone').textContent = data.phone;
        document.getElementById('location').textContent = data.location;
        document.getElementById('summary').textContent = data.summary;

        const expContainer = document.getElementById('experience-list');
        data.experience.forEach(exp => {
            const div = document.createElement('div');
            div.className = "relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active pl-8 md:pl-0";
            
            div.innerHTML = `
                <!-- Timeline Dot -->
                <div class="absolute left-0 md:left-1/2 -translate-x-1/2 flex items-center justify-center w-3 h-3 rounded-full border-2 border-accent bg-darkbg shadow-[0_0_10px_rgba(56,189,248,0.5)]"></div>
                
                <!-- Content Box -->
                <div class="bg-slate-800/50 rounded-lg p-5 border border-slate-700/50 w-full md:w-[calc(100%-2rem)] shadow-lg hover:border-accent/50 transition-colors">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-white font-bold text-lg">${exp.role}</h3>
                        <span class="text-accent text-xs font-mono bg-accent/10 px-2 py-1 rounded">${exp.dates}</span>
                    </div>
                    <div class="text-slate-300 font-medium text-sm mb-3">${exp.company}</div>
                    <ul class="list-none text-slate-400 text-sm space-y-1.5 font-light">
                        ${exp.description.map(desc => `<li class="flex items-start gap-2"><span class="text-accent mt-0.5 opacity-50">▹</span> <span>${desc}</span></li>`).join('')}
                    </ul>
                </div>
            `;
            expContainer.appendChild(div);
        });

        const eduContainer = document.getElementById('education-list');
        data.education.forEach(edu => {
             const div = document.createElement('div');
            div.innerHTML = `
                <div class="bg-darkbg/50 p-4 rounded-lg border border-slate-800">
                    <h3 class="text-white font-bold text-md mb-1">${edu.degree}</h3>
                    <div class="text-accent text-sm mb-2">${edu.institution}</div>
                    <div class="text-slate-500 text-xs font-mono">${edu.dates}</div>
                </div>
            `;
            eduContainer.appendChild(div);
        });

        const skillsContainer = document.getElementById('skills-list');
        data.skills.forEach(skill => {
            const span = document.createElement('span');
            span.className = "px-3 py-1.5 bg-slate-800 text-slate-300 rounded text-xs font-medium border border-slate-700 hover:border-accent hover:text-white transition-colors cursor-default";
            span.textContent = skill;
            skillsContainer.appendChild(span);
        });
    });
    </script>
</body>
</html>
