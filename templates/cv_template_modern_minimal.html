<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Minimal CV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#1e3a8a', // blue-900
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    </style>
</head>
<body class="bg-white p-12 text-gray-800 font-sans">
        <!-- Header -->
        <header class="border-b-2 border-gray-100 pb-8 mb-8">
            <h1 id="name" class="text-5xl font-bold tracking-tight text-gray-900 mb-2"></h1>
            <h2 id="title" class="text-2xl text-primary font-medium mb-4"></h2>
            <div class="flex flex-wrap gap-4 text-sm text-gray-500">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <span id="email"></span>
                </span>
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    <span id="phone"></span>
                </span>
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span id="location"></span>
                </span>
            </div>
        </header>

        <!-- Summary -->
        <section class="mb-8">
            <p id="summary" class="text-gray-600 leading-relaxed text-justify"></p>
        </section>

        <!-- Two Column Layout -->
        <div class="grid grid-cols-3 gap-10">
            <!-- Left Column (Main Content) -->
            <div class="col-span-2">
                <section class="mb-8">
                    <h2 class="text-xl font-bold text-gray-900 uppercase tracking-wider border-b border-gray-200 pb-2 mb-6">Experience</h2>
                    <div id="experience-list" class="space-y-6"></div>
                </section>
            </div>

            <!-- Right Column (Sidebar) -->
            <div class="col-span-1">
                <section class="mb-8">
                    <h2 class="text-xl font-bold text-gray-900 uppercase tracking-wider border-b border-gray-200 pb-2 mb-6">Education</h2>
                    <div id="education-list" class="space-y-6"></div>
                </section>

                <section class="mb-8">
                    <h2 class="text-xl font-bold text-gray-900 uppercase tracking-wider border-b border-gray-200 pb-2 mb-6">Skills</h2>
                    <div id="skills-list" class="flex flex-wrap gap-2"></div>
                </section>
            </div>
        </div>

    <!-- CV Data JSON -->
    <script type="application/json" id="cv-data">
    {
      "name": "Jane Doe",
      "title": "Senior Software Engineer",
      "email": "jane.doe@example.com",
      "phone": "+1 234 567 8900",
      "location": "San Francisco, CA",
      "summary": "Passionate and detail-oriented Software Engineer with over 8 years of experience building highly scalable applications, leading technical teams, and architecting cloud-native solutions. Dedicated to clean code, robust system architecture, and continuous improvement.",
      "experience": [
        {
          "company": "Tech Innovations Inc.",
          "role": "Lead Backend Developer",
          "dates": "Jan 2020 - Present",
          "description": [
            "Led a team of 5 engineers to rebuild the core monolith into microservices.",
            "Improved system latency by 40% through Redis caching.",
            "Architected automated CI/CD pipelines using GitHub Actions."
          ]
        },
        {
          "company": "Creative Solutions LLC",
          "role": "Software Engineer",
          "dates": "Mar 2016 - Dec 2019",
          "description": [
            "Developed responsive web interfaces using React and Tailwind CSS.",
            "Collaborated with product designers to implement pixel-perfect UIs.",
            "Mentored junior developers and conducted code reviews."
          ]
        }
      ],
      "education": [
        {
          "institution": "University of California, Berkeley",
          "degree": "B.S. in Computer Science",
          "dates": "2012 - 2016"
        }
      ],
      "skills": ["JavaScript", "Python", "React", "Node.js", "AWS", "Docker", "PostgreSQL", "System Architecture", "Agile"]
    }
    </script>

    <!-- Injection Script -->
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const dataText = document.getElementById('cv-data').textContent;
        const data = JSON.parse(dataText);

        document.getElementById('name').textContent = data.name;
        document.getElementById('title').textContent = data.title;
        document.getElementById('email').textContent = data.email;
        document.getElementById('phone').textContent = data.phone;
        document.getElementById('location').textContent = data.location;
        document.getElementById('summary').textContent = data.summary;

        const expContainer = document.getElementById('experience-list');
        data.experience.forEach(exp => {
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="flex flex-col mb-1">
                    <h3 class="text-lg font-semibold text-gray-900">${exp.role}</h3>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-primary font-medium">${exp.company}</span>
                        <span class="text-gray-500">${exp.dates}</span>
                    </div>
                </div>
                <ul class="list-disc list-inside text-gray-600 text-sm space-y-1 mt-2">
                    ${exp.description.map(desc => `<li>${desc}</li>`).join('')}
                </ul>
            `;
            expContainer.appendChild(div);
        });

        const eduContainer = document.getElementById('education-list');
        data.education.forEach(edu => {
             const div = document.createElement('div');
            div.innerHTML = `
                <h3 class="text-md font-semibold text-gray-900">${edu.degree}</h3>
                <div class="text-primary text-sm font-medium mb-1">${edu.institution}</div>
                <div class="text-gray-500 text-sm">${edu.dates}</div>
            `;
            eduContainer.appendChild(div);
        });

        const skillsContainer = document.getElementById('skills-list');
        data.skills.forEach(skill => {
            const span = document.createElement('span');
            span.className = "px-3 py-1 bg-gray-100 text-gray-700 rounded-md text-xs font-medium border border-gray-200";
            span.textContent = skill;
            skillsContainer.appendChild(span);
        });
    });
    </script>
</body>
</html>
