<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Glassmorphism CV Template</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen py-8 px-4 sm:px-6 lg:px-8 text-slate-800">

  <div
    class="max-w-[1100px] mx-auto bg-white rounded-3xl shadow-xl flex flex-col lg:flex-row overflow-hidden border border-slate-200/60">

    <!-- SIDEBAR -->
    <aside
      class="w-full lg:w-[320px] bg-[#FAFBFF] border-r border-slate-100 p-8 lg:p-10 flex flex-col relative overflow-hidden flex-shrink-0">
      <!-- Decorative background blur -->
      <div class="absolute -top-16 -left-16 w-64 h-64 bg-purple-100/50 rounded-full blur-3xl z-0"></div>

      <div class="relative z-10 mb-10 mt-4">
        <div id="avatar-initials"
          class="w-24 h-24 rounded-full bg-gradient-to-tr from-yellow-400 to-orange-400 shadow-lg mb-6 flex items-center justify-center border-4 border-white text-white font-bold text-2xl">
          <!-- Injected via JS -->
        </div>

        <h1 id="name" class="text-3xl lg:text-4xl font-extrabold text-slate-900 tracking-tight leading-none mb-2">
          <!-- Injected via JS -->
        </h1>
        <div id="title"
          class="text-[17px] font-semibold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-500 mb-8 inline-block">
          <!-- Injected via JS -->
        </div>
      </div>

      <!-- Contact Block -->
      <div id="contacts-list" class="relative z-10 flex flex-col gap-5 text-[14px] text-slate-600 font-medium">
        <!-- Injected via JS -->
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-8 lg:p-14 relative bg-white overflow-y-auto">

      <!-- Timeline Line Wrapper -->
      <div class="lg:ml-4 border-l-2 border-slate-100 pl-6 lg:pl-10 space-y-12 pb-8">

        <!-- INTRO / PROFILE -->
        <section class="relative">
          <div
            class="absolute -left-[35px] lg:-left-[51px] top-1.5 w-[18px] h-[18px] bg-purple-600 rounded-full border-[4px] border-white shadow-sm">
          </div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-5 mt-0 leading-none">Profile</h2>
          <div id="profile-content" class="text-[15px] leading-relaxed text-slate-600 max-w-3xl space-y-4">
            <!-- Injected via JS -->
          </div>
        </section>

        <!-- EXPERIENCE -->
        <section class="relative">
          <div
            class="absolute -left-[35px] lg:-left-[51px] top-1.5 w-[18px] h-[18px] bg-purple-600 rounded-full border-[4px] border-white shadow-sm">
          </div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-6 leading-none">Experience</h2>
          <div id="experience-list" class="space-y-4">
            <!-- Injected via JS -->
          </div>
        </section>

        <!-- SKILLS -->
        <section class="relative">
          <div
            class="absolute -left-[35px] lg:-left-[51px] top-1.5 w-[18px] h-[18px] bg-purple-600 rounded-full border-[4px] border-white shadow-sm">
          </div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-6 leading-none">Skills</h2>
          <div id="skills-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Injected via JS -->
          </div>
        </section>

        <!-- EDUCATION & CREDENTIALS -->
        <section class="relative">
          <div
            class="absolute -left-[35px] lg:-left-[51px] top-1.5 w-[18px] h-[18px] bg-purple-600 rounded-full border-[4px] border-white shadow-sm">
          </div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-6 leading-none">Education & Credentials</h2>
          <div id="education-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Injected via JS -->
          </div>
        </section>

        <!-- SELECTED PROJECTS -->
        <section class="relative">
          <div
            class="absolute -left-[35px] lg:-left-[51px] top-1.5 w-[18px] h-[18px] bg-purple-600 rounded-full border-[4px] border-white shadow-sm">
          </div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-6 leading-none">Selected Projects</h2>
          <div id="projects-list" class="space-y-4">
            <!-- Injected via JS -->
          </div>
        </section>

        <!-- OTHER WORK -->
        <section class="relative">
          <div
            class="absolute -left-[35px] lg:-left-[51px] top-1.5 w-[18px] h-[18px] bg-purple-600 rounded-full border-[4px] border-white shadow-sm">
          </div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-6 leading-none">Other Work</h2>
          <div id="other-work-list" class="space-y-4">
            <!-- Injected via JS -->
          </div>
        </section>

        <!-- ONLINE SECTION -->
        <section class="relative">
          <div
            class="absolute -left-[35px] lg:-left-[51px] top-1.5 w-[18px] h-[18px] bg-purple-600 rounded-full border-[4px] border-white shadow-sm">
          </div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-6 leading-none">Online</h2>
          <div id="online-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <!-- Injected via JS -->
          </div>
        </section>

      </div>

      <!-- FOOTER -->
      <footer
        class="mt-8 pt-8 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4 text-[12px] font-mono text-slate-400">
        <span id="footer-text" class="tracking-widest uppercase"></span>
        <a id="footer-link" href="#" target="_blank"
          class="hover:text-purple-600 transition-colors uppercase tracking-widest"></a>
      </footer>

    </main>
  </div>

  <!-- DATA INJECTION SCRIPT -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const dataText = document.getElementById('cv-data').textContent;
      const data = JSON.parse(dataText);

      // --- Personal Info ---
      document.getElementById('avatar-initials').textContent = data.personal.initials;
      document.getElementById('name').innerHTML = `${data.personal.firstName}<br>${data.personal.lastName}`;
      document.getElementById('title').textContent = data.personal.title;

      // --- Contacts ---
      const contactsContainer = document.getElementById('contacts-list');
      data.personal.contacts.forEach(contact => {
        const iconHtml = `<svg class="w-5 h-5" fill="${contact.value.includes('LinkedIn') ? 'currentColor' : 'none'}" stroke="${contact.value.includes('LinkedIn') ? 'none' : 'currentColor'}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${contact.iconSvg}</svg>`;

        let wrapperHtml = '';
        if (contact.link) {
          wrapperHtml = `
            <a href="${contact.link}" target="_blank" class="flex items-center gap-4 hover:text-purple-600 transition-colors group">
              <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center group-hover:bg-purple-50 group-hover:text-purple-600 transition-colors text-slate-400">
                ${iconHtml}
              </div>
              <span class="truncate">${contact.value}</span>
            </a>
          `;
        } else {
          wrapperHtml = `
            <div class="flex items-center gap-4 group">
              <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                ${iconHtml}
              </div>
              <span class="truncate">${contact.value}</span>
            </div>
          `;
        }
        contactsContainer.insertAdjacentHTML('beforeend', wrapperHtml);
      });

      // --- Profile ---
      const profileContainer = document.getElementById('profile-content');
      data.profile.forEach(paragraph => {
        profileContainer.insertAdjacentHTML('beforeend', `<p>${paragraph}</p>`);
      });

      // --- Experience ---
      const expContainer = document.getElementById('experience-list');
      data.experience.forEach(exp => {
        let contentHtml = '';
        if (exp.type === 'bullets') {
          const listItems = exp.content.map(item => `<li class="pl-1">${item}</li>`).join('');
          contentHtml = `<ul class="text-[14px] text-slate-600 leading-relaxed list-disc list-outside ml-4 space-y-1.5 marker:text-slate-300">${listItems}</ul>`;
        } else {
          contentHtml = `<p class="text-[14px] text-slate-600 leading-relaxed">${exp.content}</p>`;
        }

        expContainer.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50/70 hover:bg-slate-50 transition-colors border border-slate-100 rounded-2xl p-6 group">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-3 gap-2">
              <div>
                <h3 class="text-lg font-bold text-slate-900">${exp.role}</h3>
                <p class="text-[14px] font-medium text-slate-500 mt-0.5">${exp.company}</p>
              </div>
              <span class="inline-flex px-3 py-1 ${exp.dateClass} text-[12px] font-semibold tracking-wide rounded-lg whitespace-nowrap">${exp.dates}</span>
            </div>
            ${contentHtml}
          </div>
        `);
      });

      // --- Skills ---
      const skillsContainer = document.getElementById('skills-list');
      data.skills.forEach(skillGroup => {
        const pillsHtml = skillGroup.items.map(item => `<span class="px-3 py-1.5 ${skillGroup.pillStyle}">${item}</span>`).join('');

        skillsContainer.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50/70 border border-slate-100 rounded-2xl p-6 hover:shadow-sm transition-shadow">
            <h3 class="text-[11px] font-bold tracking-[0.15em] uppercase text-purple-600 mb-4 text-center">${skillGroup.category}</h3>
            <div class="flex flex-wrap justify-center gap-2">
              ${pillsHtml}
            </div>
          </div>
        `);
      });

      // --- Education ---
      const eduContainer = document.getElementById('education-list');
      data.education.forEach(edu => {
        eduContainer.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50/70 border border-slate-100 rounded-2xl p-6 flex flex-col justify-between">
            <div>
              <div class="flex items-center gap-3 mb-2">
                <div class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center flex-shrink-0 text-lg">
                  ${edu.icon}
                </div>
                <h3 class="text-[15px] font-bold text-slate-900 leading-snug">${edu.title}</h3>
              </div>
              <p class="text-[13px] text-slate-500 ml-11">${edu.subtitle}</p>
            </div>
            <div class="mt-4 ml-11">
              <span class="inline-flex px-2.5 py-1 bg-slate-200/60 text-slate-600 text-[11px] font-semibold tracking-wide rounded-md">${edu.dates}</span>
            </div>
          </div>
        `);
      });

      // --- Selected Projects ---
      const projectsContainer = document.getElementById('projects-list');
      data.projects.forEach(proj => {
        const linkHtml = proj.link ? `<a class="inline-block mt-3 text-[13px] font-semibold text-purple-600 hover:text-purple-700 transition-colors" href="${proj.link}" target="_blank">${proj.linkText}</a>` : '';

        projectsContainer.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50/70 hover:bg-slate-50 transition-colors border border-slate-100 rounded-2xl p-6 group">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-2 gap-2">
              <div>
                <h3 class="text-lg font-bold text-slate-900">${proj.title}</h3>
                <p class="text-[12px] font-mono text-purple-500 mt-1">${proj.stack}</p>
              </div>
              <span class="inline-flex px-2.5 py-1 ${proj.statusClass} text-[11px] font-bold uppercase tracking-widest rounded whitespace-nowrap">${proj.status}</span>
            </div>
            <p class="text-[14px] text-slate-600 leading-relaxed mt-2">${proj.description}</p>
            ${linkHtml}
          </div>
        `);
      });

      // --- Other Work ---
      const otherContainer = document.getElementById('other-work-list');
      data.otherWork.forEach(work => {
        otherContainer.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50/70 hover:bg-slate-50 transition-colors border border-slate-100 rounded-2xl p-6 group">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-2 gap-2">
              <div>
                <h3 class="text-[16px] font-bold text-slate-900">${work.title}</h3>
                <p class="text-[13px] text-slate-500 mt-0.5">
                  ${work.subtitle.split('·')[0]} · 
                  <a href="${work.link}" target="_blank" class="text-purple-600 hover:underline">${work.subtitle.split('·')[1].trim()}</a>
                </p>
              </div>
              <span class="inline-flex px-2.5 py-1 ${work.statusClass} text-[11px] font-bold uppercase tracking-widest rounded whitespace-nowrap">${work.status}</span>
            </div>
            <p class="text-[14px] text-slate-600 leading-relaxed mt-2">${work.description}</p>
          </div>
        `);
      });

      // --- Online Links ---
      const onlineContainer = document.getElementById('online-list');
      data.online.forEach(item => {
        const linkHtml = item.link
          ? `<a href="${item.link}" target="_blank" class="text-[13px] text-purple-600 hover:text-purple-700 truncate">${item.value}</a>`
          : `<div class="text-[13px] text-slate-500">${item.value}</div>`;

        onlineContainer.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50/70 border border-slate-100 rounded-xl p-4 flex flex-col gap-1">
            <div class="text-[13px] font-bold text-slate-900">${item.label}</div>
            ${linkHtml}
          </div>
        `);
      });

      // --- Footer ---
      document.getElementById('footer-text').textContent = data.footer.text;
      const footerLink = document.getElementById('footer-link');
      footerLink.textContent = data.footer.linkText;
      footerLink.href = data.footer.linkUrl;
    });
  </script>
</body>

</html>
